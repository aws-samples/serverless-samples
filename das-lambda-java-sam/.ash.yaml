    # =========================================================================
    # cfn-nag findings on das_consumer_sam_project/template.yaml (consumer SAM)
    #
    # W11 (IAM wildcard resource): kms:Decrypt/DescribeKey/GenerateDataKey use
    # Resource '*' constrained by a kms:ViaService Condition limiting access to
    # Kinesis/S3/SQS in the same region. cfn-nag does not evaluate Condition
    # blocks, so it flags W11 even though effective access is service-scoped.
    #
    # W89 (Lambda not in VPC): cfn-nag cannot resolve cross-stack !ImportValue
    # references. The Lambda IS in a VPC via VpcConfig importing
    # PrivateSubnet1/2/3 and LambdaSecurityGroup from setup-das-cfn.yaml.
    # =========================================================================

    - rule_id: 'CFN_NAG_W11'
      path: 'das_consumer_sam_project/template.yaml'
      reason: >
        kms:Decrypt/DescribeKey/GenerateDataKey use Resource '*' constrained
        by a kms:ViaService Condition limiting access to Kinesis/S3/SQS in the
        same region. Standard AWS pattern for service-scoped KMS access when
        specific key ARNs aren't known at template time. Effective access is
        limited to keys used by these services in this account+region.

    - rule_id: 'CFN_NAG_W89'
      path: 'das_consumer_sam_project/template.yaml'
      reason: >
        False positive: cfn-nag cannot resolve cross-stack !ImportValue
        references. The Lambda IS deployed inside a VPC — see VpcConfig with
        PrivateSubnet1/2/3 and LambdaSecurityGroup imported from the parent
        stack (setup-das-cfn.yaml). VPC placement is verified at deploy time
        when the imports resolve.
