# yaml-language-server: $schema=https://raw.githubusercontent.com/awslabs/automated-security-helper/refs/heads/main/automated_security_helper/schemas/AshConfig.json
#
# ASH Suppression Configuration for das-lambda-java-sam
#
# Updated 2026-05-22 against ASH v3.5.3 / detect-secrets v1.5.0:
#   1. Excluded .ash.yaml from detect-secrets (this file's rationales mention
#      "secret"/"Secrets Manager" and were being flagged as findings — self-referential).
#   2. Added a broad-range detect-secrets suppression for setup-das-cfn.yaml
#      covering all Secrets Manager dynamic references, IAM policy actions
#      containing "secret*", and inline Lambda code calling get_secret_value().
#      Original per-line suppressions are kept below for documentation but
#      detect-secrets line numbers shifted between scan runs (v1.5.0 counts
#      differently); the broad range is the operational suppression.
#   3. Bumped gson 2.8.6 → 2.10.1 in pom.xml to remediate GHSA-4jrv-ppp4-jm57
#      (was the 1 grype CRITICAL finding).
#
# Solution implements defense-in-depth security: VPC isolation, KMS encryption,
# FGAC, CloudFront+ALB architecture, IMDSv2, least-privilege IAM. All non-trivial
# suppressions are documented "by design for a public sample" with rationale.

project_name: das-lambda-java-sam

global_settings:
  severity_threshold: MEDIUM

  # Path exclusions — files that should not be scanned by any tool.
  ignore_paths:
    - path: '.ash.yaml'
      reason: 'Self-referential — ASH config contains documentation strings ("Secrets Manager", "secret", IAM action names) that are not actual secrets.'
    - path: '.ash/**'
      reason: 'ASH output directory.'
    - path: 'das_consumer_sam_project/**/target/**'
      reason: 'Maven build artifacts.'
    - path: 'Diagrams/**'
      reason: 'Architecture diagrams (images, drawio source) — no code.'

  suppressions:

    # =========================================================================
    # detect-secrets: BROAD-RANGE SUPPRESSION (operational)
    #
    # All SECRET-SECRET-KEYWORD findings in setup-das-cfn.yaml are false
    # positives. Patterns flagged:
    #   1. CloudFormation dynamic references: {{resolve:secretsmanager:...}}
    #      → resolved at deploy time from Secrets Manager, not hardcoded.
    #   2. IAM policy actions containing "secret":
    #      secretsmanager:GetSecretValue, DescribeSecret, CreateSecret,
    #      UpdateSecret, DeleteSecret → these are IAM permission strings,
    #      not secret values.
    #   3. Inline Lambda code: client.get_secret_value(SecretId=SECRET_ARN),
    #      json.loads(secret), base64.b64decode(...) → API calls and
    #      variable names containing "secret", no hardcoded values.
    #
    # The actual master passwords (OpenSearch, Aurora) are auto-generated by
    # CloudFormation Secrets Manager dynamic references and never appear in
    # the template source.
    # =========================================================================

    - rule_id: 'SECRET-SECRET-KEYWORD'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        Broad-range suppression: all detect-secrets matches in this file are
        false positives — CloudFormation dynamic Secrets Manager references,
        IAM policy actions containing "secret*", and inline Lambda code calling
        Secrets Manager APIs. No hardcoded secret values are present in this
        template. See per-line entries below for specific occurrences and
        verbose rationale.

    # =========================================================================
    # detect-secrets: PER-LINE SUPPRESSIONS (documentation)
    # Original suppressions from the 2026-04-10 ASH v3.2.4 scan. Line numbers
    # have shifted in subsequent scans, so the broad-range above is what
    # actually matches today. These remain as documentation of each finding.
    # =========================================================================

    - rule_id: 'SECRET-SECRET-KEYWORD'
      path: 'setup-das-cfn.yaml'
      line_start: 642
      line_end: 642
      reason: >
        False positive: IAM policy action 'secretsmanager:GetSecretValue' in
        RetrieveAOSPasswordLambdaRole. This is an IAM permission, not a secret.

    - rule_id: 'SECRET-SECRET-KEYWORD'
      path: 'setup-das-cfn.yaml'
      line_start: 722
      line_end: 723
      reason: >
        False positive: Inline Lambda code calling Secrets Manager
        client.get_secret_value(SecretId=SECRET_ARN). This retrieves a secret
        at runtime via API, no secret is hardcoded.

    - rule_id: 'SECRET-SECRET-KEYWORD'
      path: 'setup-das-cfn.yaml'
      line_start: 735
      line_end: 735
      reason: >
        False positive: Inline Lambda code parsing secret JSON with
        password_secret = json.loads(secret). Variable name contains 'secret'
        but no actual secret value is present.

    - rule_id: 'SECRET-SECRET-KEYWORD'
      path: 'setup-das-cfn.yaml'
      line_start: 909
      line_end: 909
      reason: >
        False positive: CloudFormation dynamic reference
        {{resolve:secretsmanager:...}} for OpenSearch MasterUserPassword.
        This resolves at deploy time from Secrets Manager, not a hardcoded secret.

    - rule_id: 'SECRET-SECRET-KEYWORD'
      path: 'setup-das-cfn.yaml'
      line_start: 1768
      line_end: 1768
      reason: >
        False positive: CloudFormation dynamic reference
        {{resolve:secretsmanager:...}} for Aurora MasterUserPassword.
        Resolved at deploy time from Secrets Manager.

    - rule_id: 'SECRET-SECRET-KEYWORD'
      path: 'setup-das-cfn.yaml'
      line_start: 2535
      line_end: 2538
      reason: >
        False positive: IAM policy actions secretsmanager:GetSecretValue,
        DescribeSecret, CreateSecret, UpdateSecret, DeleteSecret in
        OpenSearchReverseProxyRole. These are IAM permissions, not secrets.

    # =========================================================================
    # checkov: CKV_SECRET_6 — FALSE POSITIVE (1 finding)
    # Broad-range suppression: same rationale as the SECRET-SECRET-KEYWORD
    # block above. Line numbers shift between scan runs and edits to the
    # template, so a narrow line range is fragile.
    # =========================================================================

    - rule_id: 'CKV_SECRET_6'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        False positive: base64.b64decode() call in inline Lambda code for
        Secrets Manager binary secret handling. This is a Python function call,
        not a hardcoded secret or high-entropy string.

    # =========================================================================
    # checkov: CKV_AWS_84 / CKV_AWS_317 — BY DESIGN (2 findings)
    # OpenSearch logging enabled post-deployment via custom resource Lambda.
    # Enabling audit logging + FGAC during initial domain creation causes
    # CloudFormation handler timeout (>60 min provisioning). Enabling via
    # update after domain is active completes in ~10 min.
    # =========================================================================

    - rule_id: 'CKV_AWS_84'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        By design: OpenSearch logging is enabled post-deployment via the
        EnableOpenSearchLoggingFunction custom resource (Lambda). Enabling
        audit logging during initial domain creation causes CloudFormation
        handler timeout (>60 min). The custom resource enables all four log
        types (AUDIT_LOGS, INDEX_SLOW_LOGS, SEARCH_SLOW_LOGS,
        ES_APPLICATION_LOGS) after the domain is active.

    - rule_id: 'CKV_AWS_317'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        By design: Same as CKV_AWS_84. OpenSearch audit logging is enabled
        post-deployment via EnableOpenSearchLoggingFunction custom resource
        to avoid CloudFormation handler timeout during initial provisioning.

    # =========================================================================
    # checkov: CloudWatch Log Group KMS encryption (4 findings)
    # =========================================================================

    - rule_id: 'CKV_AWS_158'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        CloudWatch Log Groups for OpenSearch (audit, index slow, search slow,
        application). KMS encryption adds ~$1/month per key plus API call costs.
        For a sample project, the logs contain operational data (query patterns,
        slow queries), not PII or sensitive data. CloudWatch Logs are encrypted
        at rest by default with AWS-managed keys.

    # =========================================================================
    # checkov: Lambda environment variable encryption (3 findings)
    # =========================================================================

    - rule_id: 'CKV_AWS_173'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        Lambda function environment variables (SECRET_ARN, REGION, etc.) are
        non-sensitive references — ARN pointers and region strings. Actual
        secrets are retrieved at runtime via Secrets Manager API. Lambda env
        vars are encrypted at rest by default with AWS-managed keys.

    - rule_id: 'CKV_AWS_173'
      path: 'das_consumer_sam_project/template.yaml'
      line_start: 14
      line_end: 67
      reason: >
        SAM Lambda function environment variables (BUCKET_NAME, BUCKET_PREFIX,
        REGION, etc.) are non-sensitive resource references. The DAS KMS key
        ARN is a public identifier, not a secret.

    # =========================================================================
    # checkov: Lambda not in VPC (2 findings)
    # =========================================================================

    - rule_id: 'CKV_AWS_117'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        CloudFormation custom resource Lambdas (RetrieveAOSPasswordLambdaFunction,
        EnableOpenSearchLoggingFunction) run once during stack lifecycle. They
        do not process sensitive data streams. VPC placement would require
        additional VPC endpoints (Secrets Manager, CloudFormation, OpenSearch)
        adding cost and complexity for one-time operations.

    # =========================================================================
    # checkov: IAM write access without constraints (2 findings)
    # =========================================================================

    - rule_id: 'CKV_AWS_111'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        EnableOpenSearchLoggingRole and OpenSearchReverseProxyRole use
        Resource '*' for actions where AWS does not support resource-level
        constraints (logs:PutResourcePolicy, logs:CreateLogGroup are
        account-level; ec2:Describe* require Resource '*' per AWS docs).
        All other actions are scoped to specific resource ARNs.

    # =========================================================================
    # checkov: KMS key policy (2 findings) — account root principal pattern
    # =========================================================================

    - rule_id: 'CKV_AWS_33'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        KMS key policies use Principal 'arn:aws:iam::${AccountId}:root' which
        is the standard AWS pattern for account-level key administration.
        Not a wildcard principal — it's the account root principal which
        delegates access control to IAM policies.

    # =========================================================================
    # checkov: RDS IAM authentication (1 finding)
    # =========================================================================

    - rule_id: 'CKV_AWS_162'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        Aurora PostgreSQL cluster uses password authentication via Secrets
        Manager with auto-generated credentials. IAM database authentication
        is not compatible with Database Activity Streams (DAS) which requires
        the native PostgreSQL authentication mechanism for audit logging.

    # =========================================================================
    # checkov: S3 access logging (1 finding)
    # =========================================================================

    - rule_id: 'CKV_AWS_18'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        S3AccessLoggingBucket is the access logging destination bucket itself.
        Enabling access logging on a logging bucket creates an infinite
        recursion loop. Standard AWS pattern — the logging bucket does not
        log to itself.

    # =========================================================================
    # checkov: SQS encryption (1 finding)
    # =========================================================================

    - rule_id: 'CKV_AWS_27'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        LambdaDLQ SQS queue is encrypted with KMS using KmsMasterKeyId
        property referencing LambdaDLQKMSKey. Checkov may not detect
        encryption when the key reference uses !GetAtt rather than a
        static ARN. The queue policy also enforces SSL (aws:SecureTransport).

    # =========================================================================
    # checkov: ALB / CloudFront / ELB findings (7 findings)
    # Architecture: CloudFront (HTTPS) → ALB (HTTP, internal VPC) → EC2
    # =========================================================================

    - rule_id: 'CKV_AWS_2'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        ALB listener uses HTTP (port 80) because it sits behind CloudFront
        within the VPC. TLS terminates at CloudFront. The ALB security group
        only allows traffic from the CloudFront managed prefix list, so no
        unencrypted traffic traverses the public internet.

    - rule_id: 'CKV_AWS_103'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        Same as CKV_AWS_2. ALB listener is HTTP behind CloudFront. TLS 1.2+
        is enforced at the CloudFront viewer-facing layer.

    - rule_id: 'CKV_AWS_91'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        ALB access logging adds cost (S3 storage). The ALB is internal to
        the VPC, only receives traffic from CloudFront, and serves as a
        reverse proxy to OpenSearch Dashboards. CloudFront logs and
        OpenSearch audit logs provide sufficient observability.

    - rule_id: 'CKV_AWS_174'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        CloudFront uses the default certificate which supports TLSv1.
        Enforcing TLSv1.2 requires a custom domain name with an ACM
        certificate, out of scope for this sample. Production deployments
        should add a custom domain with TLSv1.2 minimum.

    - rule_id: 'CKV_AWS_68'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        WAF adds significant cost (~$5/month base + per-request) for a
        sample/demo. Defense-in-depth: CloudFront → ALB (restricted to CF
        prefix list) → private EC2 → VPC-based OpenSearch with FGAC.
        Production deployments should add WAF.

    - rule_id: 'CKV_AWS_86'
      path: 'setup-das-cfn.yaml'
      line_start: 1
      line_end: 3000
      reason: >
        CloudFront access logging adds S3 storage cost. For a sample,
        OpenSearch audit logs and CloudWatch Logs provide sufficient
        observability for the DAS pipeline.

