AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  database_activity_streams_event_consumer_function

  Sample SAM Template for database-activity-streams-consumer-with-sam

# More info about Globals: https://github.com/awslabs/serverless-application-model/blob/master/docs/globals.rst
Globals:
  Function:
    Timeout: 30

Resources:
  LambdaDatabaseActivityStreamsConsumerJavaFunction:
    Type: AWS::Serverless::Function # More info about Function Resource: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#awsserverlessfunction
    Properties:
      CodeUri: database_activity_streams_event_consumer_function
      Handler: com.amazonaws.services.lambda.samples.events.das.HandlerAuroraStream::handleRequest
      Runtime: java21
      Architectures:
        - x86_64
      MemorySize: 512
      ReservedConcurrentExecutions: 10
      DeadLetterQueue:
        Type: SQS
        TargetArn: !ImportValue LambdaDLQArn
      VpcConfig:
        SubnetIds:
          - !ImportValue PrivateSubnet1
          - !ImportValue PrivateSubnet2
          - !ImportValue PrivateSubnet3
        SecurityGroupIds:
          - !ImportValue LambdaSecurityGroup
      Environment: # More info about Env Vars: https://github.com/awslabs/serverless-application-model/blob/master/versions/2016-10-31.md#environment-object
        Variables:
          DATABASE_TYPE: postgres
          S3_BUCKET: !Ref DasS3Bucket
          S3_PREFIX: !Ref DasS3Prefix
          JAVA_TOOL_OPTIONS: -XX:+TieredCompilation -XX:TieredStopAtLevel=1 # More info about tiered compilation https://aws.amazon.com/blogs/compute/optimizing-aws-lambda-function-performance-for-java/
      Events:
        Stream:
          Type: Kinesis
          Properties:
            Stream: !Join ['', ["arn:", "aws:", "kinesis:", !Ref "AWS::Region", ":", !Ref "AWS::AccountId", ":", "stream/aws-rds-das-cluster-", !Ref DasKinesisStream]]
            BatchSize: 10
            StartingPosition: LATEST
            Enabled: true
            MaximumBatchingWindowInSeconds: 300
            MaximumRecordAgeInSeconds: 7200
            MaximumRetryAttempts: 10
      Policies:
        # Minimum AWS-managed policies for a VPC-attached Lambda.
        # AWSLambdaBasicExecutionRole       — CloudWatch Logs.
        # AWSLambdaVPCAccessExecutionRole   — ENI lifecycle for VpcConfig.
        # AWSXrayWriteOnlyAccess            — X-Ray tracing (write-only).
        # AWSLambda_ReadOnlyAccess and AmazonS3FullAccess removed — no runtime
        # use, replaced by the scoped statements below (CFN_NAG_W11 fix).
        - AWSLambdaBasicExecutionRole
        - AWSLambdaVPCAccessExecutionRole
        - AWSXrayWriteOnlyAccess
        # Scoped S3 — the function only writes DAS records to a single prefix
        # in the bucket passed via DasS3Bucket. No reads, no deletes, no list.
        - Statement:
            - Effect: Allow
              Action:
                - s3:PutObject
                - s3:PutObjectAcl
              Resource: !Sub "arn:aws:s3:::${DasS3Bucket}/${DasS3Prefix}/*"
        # DAS payload decryption — the Lambda calls KMS Decrypt DIRECTLY (AWS
        # Encryption SDK / AWSKMSClient.decrypt), NOT via the Kinesis service,
        # so this CANNOT be gated by kms:ViaService. Scope it to the exact DAS
        # key ARN exported by the parent stack instead.
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:DescribeKey
              Resource: !ImportValue DasKmsKeyArn
        # Scoped KMS for SSE — Resource:'*' constrained by kms:ViaService so the
        # Lambda can use KMS through S3 (SSE-KMS PutObject) and SQS (SSE-KMS DLQ
        # writes) in the same region. GenerateDataKey is required for SSE-KMS
        # writes to S3 and SQS.
        - Statement:
            - Effect: Allow
              Action:
                - kms:Decrypt
                - kms:DescribeKey
                - kms:GenerateDataKey
              Resource: '*'
              Condition:
                StringEquals:
                  "kms:ViaService":
                    - !Sub "s3.${AWS::Region}.amazonaws.com"
                    - !Sub "sqs.${AWS::Region}.amazonaws.com"
        - Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !ImportValue LambdaDLQArn

Parameters:  
  DasKinesisStream:
    Type: String
    Description: Enter the unique name of the Kinesis Data Stream created by Database Activity Streams (only string after aws-rds-das-cluster-)
    Default: DAS_KINESIS_STREAM_NAME
  DasS3Bucket:
    Type: String
    Description: Enter the name of the S3 bucket where Database Activity Streams records will be posted
    Default: S3_BUCKET_NAME
  DasS3Prefix:
    Type: String
    Description: Enter the name of the S3 bucket prefix where Database Activity Streams records will be posted
    Default: das
    